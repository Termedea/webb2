<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12.2 -Formulär</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.1/css/all.css"
        integrity="sha384-vp86vTRFVJgpjF9jiIGPEEqYqlDwgyBgEF109VFjmqGmIY/Y4HV4d3Gp2irVfcrp" crossorigin="anonymous" />
</head>

<body>
    <div id="error-msg"></div>
    <form action="">
        <div class="input-group">
            <label for="email">Ange e-postadress:</label>
            <input type="text" id="email" name="email" placeholder="namn@domän.se" />
        </div>
        <div class="input-group">
            <label for="password">Ange lösenord:</label>
            <input type="password" id="password" name="password" />
        </div>
        <div class="input-group">
            <label for="repeatPassword">Repetera lösenord:</label>
            <input type="password" id="repeat-password" name="repeatPassword" />
        </div>
        <div class="input-group">
            <button type="submit" id="submit" name="submit">Skicka</button>
        </div>
    </form>


    <script src="main.js"></script>
</body>

</html>
