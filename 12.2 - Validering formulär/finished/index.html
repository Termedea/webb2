<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12.2 -Formulär</title>
    <link rel="stylesheet" href="main.css">

</head>

<body>


    <form action="#" id="registration-form">
        <div class="input-group">
            <label for="email">Ange e-postadress:</label>
            <input type="text" id="email" name="email" placeholder="namn@domän.se" />
            <div class="error-message" id="email-error"></div>
        </div>
        <div class="input-group">
            <label for="password">Ange lösenord:</label>
            <input type="password" id="password" name="password" />
            <div class="error-message" id="password-error"></div>
        </div>
        <div class="input-group">
            <label for="repeatPassword">Repetera lösenord:</label>
            <input type="password" id="repeat-password" name="repeatPassword" />
            <div class="error-message" id="repeat-password-error"></div>
        </div>
        <div class="input-group">
            <button type="submit" id="send" name="send" disabled="true">Skicka</button>
        </div>
    </form>


    <script src="main.js"></script>
</body>

</html>
